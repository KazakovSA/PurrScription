services:
  api:
    command:
      - sh
      - -c
      - alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 1 --proxy-headers --forwarded-allow-ips=*

  # web is no longer published on the host; Caddy is the only public entrypoint.
  web:
    ports: []

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [backend]

volumes:
  caddy_data:
  caddy_config:
