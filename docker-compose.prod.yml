services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?required}
      POSTGRES_USER: ${POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?required}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?required}
    networks: [backend]

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
      PURRSCRIPTION_DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY:?required}
      CORS_ORIGINS: ${PUBLIC_ORIGIN:?required}
      FEATURE_DEMO_MODE: "false"
      MEDIA_STORAGE_PATH: /data/media
      EXPORT_STORAGE_PATH: /data/exports
    volumes:
      - app_data:/data
    command: ["sh", "-c", "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2 --proxy-headers --forwarded-allow-ips=*"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [backend]

  web:
    build:
      context: .
      dockerfile: infra/Dockerfile.web
      target: prod
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      api: {condition: service_healthy}
    networks: [backend]

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - ./backups:/backups
    command: ["sh", "-c", "while true; do pg_dump -h postgres -U ${POSTGRES_USER} -d ${POSTGRES_DB} -Fc > /backups/purrscription-$$(date +%Y%m%d-%H%M%S).dump; find /backups -name '*.dump' -mtime +14 -delete; sleep 86400; done"]
    depends_on:
      postgres: {condition: service_healthy}
    networks: [backend]

volumes:
  postgres_data:
  redis_data:
  app_data:

networks:
  backend:
    internal: false
