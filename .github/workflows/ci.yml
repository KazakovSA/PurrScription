name: CI

on:
  push:
    branches: [ main, develop, lead/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint frontend
        run: npm run lint -w apps/web
      
      - name: Lint contracts
        run: npm run lint -w packages/contracts
  
  type-check:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type-check frontend
        run: npm run type-check -w apps/web
      
      - name: Type-check contracts
        run: npm run type-check -w packages/contracts
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
      
      - name: Install Python dependencies
        run: |
          cd apps/api
          pip install -e .[dev]
      
      - name: Type-check backend
        run: |
          cd apps/api
          mypy api --ignore-missing-imports

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm run test -w apps/web
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/web/coverage/coverage-final.json
          flags: frontend

  test-contracts:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm run test -w packages/contracts

  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: purrscription_test
          POSTGRES_USER: purrscription
          POSTGRES_PASSWORD: purrscription
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
          cache: pip
      
      - name: Install dependencies
        run: |
          cd apps/api
          pip install -e .[dev]
      
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://purrscription:purrscription@localhost:5432/purrscription_test
        run: |
          cd apps/api
          alembic upgrade head
      
      - name: Run tests
        env:
          DATABASE_URL: postgresql://purrscription:purrscription@localhost:5432/purrscription_test
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: testing
        run: |
          cd apps/api
          pytest tests/ -v --cov=api --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/api/coverage.xml
          flags: backend

  build:
    runs-on: ubuntu-latest
    needs: [lint, type-check, test-frontend, test-contracts, test-backend]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build frontend
        run: npm run build -w apps/web
      
      - name: Build contracts
        run: npm run build -w packages/contracts
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
      
      - name: Build backend
        run: |
          cd apps/api
          pip install -e .

  commit-lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      
      - name: Install commitlint
        run: npm install --save-dev @commitlint/cli @commitlint/config-conventional
      
      - name: Validate commits
        run: |
          npx commitlint --from ${{ github.event.pull_request.base.sha }} --to HEAD || npx commitlint --from HEAD~1

  docker-build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build API image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./infra/Dockerfile.api
          push: false
      
      - name: Build Web image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./infra/Dockerfile.web
          push: false
